<!DOCTYPE html>
<html>
<head>
    <title>Register Student</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding-top: 50px; background-color: #f4f7f6; }
        .form-container { background: white; padding: 20px; display: inline-block; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        input { display: block; margin: 10px auto; padding: 10px; width: 250px; border: 1px solid #ddd; border-radius: 5px; }
        button { padding: 10px 20px; background-color: #28a745; color: white; border: none; border-radius: 5px; cursor: pointer; }
        button:hover { background-color: #218838; }
    </style>
</head>
<body>
    <div class="form-container">
        <h2>Student Registration</h2>
        <form method="post">
            <input type="number" name="id" placeholder="Student ID (Numbers Only)" required>
            <input type="text" name="name" placeholder="Full Name" required>
            <input type="text" name="roll" placeholder="Roll Number" required>
            <input type="text" name="course" placeholder="Course" required>
            <input type="text" name="year" placeholder="Year" required>
            <p style="font-size: 0.8em; color: #666;">Note: Stay still! Camera will capture your face after clicking.</p>
            <button type="submit">Capture Face & Register</button>
        </form>
        <br>
        <a href="/dashboard">Back to Dashboard</a>
    </div>
</body>
</html>
